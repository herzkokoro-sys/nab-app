<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NAB案件登録（練習）</title>
</head>
<body>

  <h1>NAB 案件登録</h1>

  <!-- 入力欄 -->
  <p>
    図面番号：<input type="text" id="zuban">
  </p>
  <p>
    製品名：<input type="text" id="hinmei">
  </p>

  <!-- 操作ボタン -->
  <button id="addBtn">登録</button>

  <!-- 一覧表示エリア -->
  <h2>登録一覧</h2>
  <div id="list"></div>

  <!-- jQuery 読み込み（自分のコードより必ず上！） -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <script>
     // LocalStorageの保存キー
    const STORAGE_KEY = "nab_cases";

    // 保存済みデータを読み込む（無ければ空配列）
    let cases = [];
    if (localStorage.getItem(STORAGE_KEY)) {
      cases = JSON.parse(localStorage.getItem(STORAGE_KEY));
    }

    // 一覧を画面に描画する関数（配列＋ループ）
    function render() {
      const html = [];
      for (let i = 0; i < cases.length; i++) {
        html.push("<p>図番：" + cases[i].zuban + " ／ 品名：" + cases[i].hinmei + "</p>");
      }
      $("#list").html(html.join(""));
    }

    // 最初に一度描画（リロードしてもデータが残る）
    render();

    // 登録ボタン
    $("#addBtn").on("click", function () {
      const zuban = $("#zuban").val();
      const hinmei = $("#hinmei").val();

      // 入力チェック（条件分岐）
      if (zuban === "" || hinmei === "") {
        alert("図番と品名を両方入力してください");
        return;
      }

      // 配列の先頭に追加（オブジェクトで保存）
      cases.unshift({ zuban: zuban, hinmei: hinmei });

      // LocalStorageに保存（JSON形式）
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cases));

      // 入力欄をクリア
      $("#zuban").val("");
      $("#hinmei").val("");

      // 再描画
      render();
    });
  </script>




</body>
</html>
